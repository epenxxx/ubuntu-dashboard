<!DOCTYPE html><html lang="id" class="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login | Orion Core</title>
    <script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>body{background: #0B1121;}</style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans p-4">
    <div class="w-full max-w-md bg-[#151f32] p-8 rounded-3xl border border-slate-700/50 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-400 to-blue-500"></div>
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 text-3xl mb-4 shadow-[0_0_15px_rgba(34,211,238,0.2)]"><i class="fa-brands fa-ubuntu"></i></div>
            <h1 class="text-2xl font-bold text-white tracking-wide">ORION CORE</h1>
            <p class="text-xs text-cyan-500/70 mt-1 uppercase tracking-widest font-mono">Secure Access</p>
        </div>
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('error')) document.write('<div class="bg-rose-500/10 border border-rose-500/30 text-rose-400 p-3 rounded-xl text-sm mb-4 text-center">Kredensial tidak valid!</div>');
        </script>
        <form action="/login" method="POST" class="space-y-5">
            <div><label class="block text-xs font-bold uppercase text-slate-400 mb-2">Username</label><input type="text" name="username" class="w-full bg-[#0B1121] border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-400" required></div>
            <div><label class="block text-xs font-bold uppercase text-slate-400 mb-2">Password</label><input type="password" name="password" class="w-full bg-[#0B1121] border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-400" required></div>
            <button class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)] transition mt-4">MASUK SISTEM</button>
        </form>
    </div>
</body></html>
